name: Monaco Angular PR

on:
  pull_request:
    branches:
      - master
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "pkg/**/*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "20.x"
          node-version-file: "package.json"
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter sandbox exec playwright install --with-deps chromium
      - run: pnpm test
      - name: Generate changeset
        run: |
          TYPE="patch"
          TITLE="${{ github.event.pull_request.title }}"
          
          if echo "$TITLE" | grep -qiE "^feat|feature|minor"; then
            TYPE="minor"
          elif echo "$TITLE" | grep -qiE "^breaking|major|BREAKING"; then
            TYPE="major"
          fi
          
          echo "---" > .changeset/auto-changeset.md
          echo "\"monaco-angular-ls\": $TYPE" >> .changeset/auto-changeset.md
          echo "---" >> .changeset/auto-changeset.md
          echo "" >> .changeset/auto-changeset.md
          echo "$TITLE" >> .changeset/auto-changeset.md
      
      - name: Commit changeset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changeset/auto-changeset.md
          git commit -m "chore: add changeset [skip ci]" || echo "No changes to commit"
          git push